<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <title>Admin – Ecrin d'art d'amina</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      .securitySection {
        width: 100%;
        height: 130%;
        position: absolute;
        z-index: 2001;
        backdrop-filter: blur(12px);
        background: linear-gradient(135deg, #0f172a61, #1e293b94);
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .securityBox {
        width: 370px;
        height: 419px;
        margin-top: 110px;
        border: 1px solid rgb(87 69 69);
        box-shadow: 0 0 10px 2px #917777;
        display: flex;
        flex-direction: column;
        padding: 50px 30px;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        border-radius: 34px;
        text-align: center;
      }
      .securityBox.submit {
        justify-self: center;
        width: max-content;
        padding: 10px 20px;
        background-color: #0ea5e9;
        color: white;
      }

      body {
        font-family: "Inter", sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: #f8fafc;
        min-height: 100vh;
      }

      .layout {
        display: flex;
        min-height: 100vh;
      }

      /* HAMBURGER */
      .hamburger {
        display: none;
        position: fixed;
        top: 20px;
        left: 20px;
        z-index: 2000;
        background: rgba(0, 0, 0, 0.5);
        backdrop-filter: blur(10px);
        border: none;
        padding: 10px 14px;
        border-radius: 12px;
        color: white;
        font-size: 20px;
        cursor: pointer;
      }

      /* SIDEBAR */
      .sidebar {
        padding-top: 131px;
        width: 250px;
        background: rgb(21 39 49);
        backdrop-filter: blur(25px);
        padding: 30px 20px;
        border-right: 1px solid rgba(255, 255, 255, 0.08);
        transition: 0.3s;
        box-shadow: 4px 1px 20px 0px rgba(0, 0, 0, 0.4);
      }

      .sidebar h2 {
        margin-bottom: 20px;
        font-weight: 700;
        text-align: center;
      }

      .sidebar img {
        width: 211px;
        background: white;
        margin: 10px 0 30px;
        align-self: center;
        display: flex;
        justify-self: center;
        border-radius: 127px;
      }

      .sidebar nav {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .menu-btn {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.1);
        color: white;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.2s;
        text-align: left;
      }

      .menu-btn:hover {
        background: rgba(56, 189, 248, 0.2);
      }

      .menu-btn.active {
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      }

      /* ADMIN CONTENT */
      .admin {
        flex: 1;
        padding: 60px 40px;
        max-width: 1200px;
        margin: auto;
      }

      .section {
        background: rgba(255, 255, 255, 0.06);
        backdrop-filter: blur(20px);
        padding: 30px;
        color: steelblue;
        border: 1px solid #8080803d;
        border-radius: 18px;
        margin-bottom: 30px;
        /* border: 1px solid rgba(255, 255, 255, 0.08); */
        animation: fadeIn 0.2s ease;
        box-shadow: inset 0 0 10px #203a4f;
      }
      .h3 {
        margin: 20px;
        text-align: center;
      }
      .hidden {
        display: none;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(5px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
      }

      input,
      select {
        padding: 14px;
        border-radius: 12px;
        border: 1px solid #8080806e;
        outline: none;
        margin-top: 10px;
        font-size: 14px;
        color: black;
        box-shadow: 0 0 4px 0px;
      }

      button {
        padding: 14px 22px;
        border-radius: 12px;
        border: none;
        font-weight: 600;
        cursor: pointer;
        background: linear-gradient(135deg, #38bdf8, #0ea5e9);
        color: white;
        margin-top: 20px;
        transition: 0.2s;
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(14, 165, 233, 0.3);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .preview {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-top: 15px;
      }

      .preview-item {
        position: relative;
      }

      .preview-item img {
        width: 90px;
        height: 90px;
        border-radius: 12px;
        object-fit: cover;
      }

      .remove-img {
        position: absolute;
        top: -6px;
        right: -6px;
        background: #dc2626;
        border: none;
        border-radius: 50%;
        width: 22px;
        height: 22px;
        color: white;
        cursor: pointer;
      }

      .toast {
        position: fixed;
        top: 20px;
        right: 20px;
        padding: 15px 20px;
        border-radius: 12px;
        background: #16a34a;
        color: white;
        font-weight: 600;
        opacity: 0;
        transform: translateY(-10px);
        transition: 0.3s;
        z-index: 9999;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.error {
        background: #dc2626;
      }

      .sidebarOverlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(4px);
        display: none;
        z-index: 1500;
      }

      .sidebarOverlay.active {
        display: block;
      }

      .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top: 2px solid white;
        border-radius: 50%;
        display: inline-block;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
      }

      @keyframes spin {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      button.loading {
        pointer-events: none;
        opacity: 0.8;
      }

      /* MOBILE */
      @media (max-width: 900px) {
        .hamburger {
          display: block;
        }

        .sidebar {
          position: fixed;
          top: 0;
          left: -260px;
          height: 100%;
          z-index: 1800;
        }

        .sidebar.active {
          left: 0;
        }

        .admin {
          padding: 80px 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="securitySection">
      <div class="securityBox">
        <h1 style="margin-bottom: 54px">Admin</h1>
        <input
          type="text"
          name="userName"
          id="userName"
          placeholder="Nom d'utilisateur"
          required
        />
        <input
          type="password"
          name="password"
          id="password"
          placeholder="Mot de passe"
          required
        />
        <button
          type="submit"
          class="connect"
          onclick="securityCheck()"
          fdprocessedid="44i64q"
          style="
            display: flex;
            margin-top: 60px;
            width: 200px;
            justify-self: center;
            align-self: center;
            justify-content: center;
            background: forestgreen;
          "
        >
          Se connecter
        </button>
      </div>
    </div>
    <button class="hamburger" id="hamburger">☰</button>
    <div class="sidebarOverlay" id="sidebarOverlay"></div>
    <div class="toast" id="toast"></div>

    <div class="layout">
      <aside class="sidebar" id="sidebar">
        <h2>Admin</h2>
        <img
          src="https://res.cloudinary.com/dpsewpbqa/image/upload/v1772286865/logoEcrin_taiajz.png"
          alt="logo"
        />

        <nav>
          <button class="menu-btn active" data-target="add">Ajouter</button>
          <button class="menu-btn" data-target="availability">
            Disponibilité
          </button>
          <button class="menu-btn" data-target="price">Prix</button>
          <button class="menu-btn" data-target="name">Nom</button>
          <button class="menu-btn" data-target="badges">Badges</button>
          <button class="menu-btn" data-target="delete">Supprimer</button>
          <button class="menu-btn" data-target="stats">Statistiques</button>
        </nav>
      </aside>
      <div class="admin">
        <h1 style="margin-bottom: 80px; text-align: end">Panneau Admin</h1>
        <!-- ADD PRODUCT -->
        <div class="section" id="add">
          <h3 style="margin: 20px">Ajouter un produit</h3>
          <div class="grid">
            <input id="id" placeholder="ID produit" />
            <input id="name" placeholder="Nom du produit" />
            <input id="price" type="number" placeholder="Prix" />
            <select id="category">
              <option value="">Choisir la page</option>
              <option value="Homme">Homme</option>
              <option value="Femme">Femme</option>
              <option value="Enfant">Enfant</option>
              <option value="Cadeau">Cadeau</option>
              <option value="Maternite">Maternite</option>
              <option value="CadeauSpecial">Cadeau Special</option>
              <option value="Sport">Sport</option>
            </select>
            <select id="type">
              <option value="">Type</option>
              <option value="haut">Haut</option>
              <option value="bas">Bas</option>
              <option value="chaussure">Chaussure</option>
              <option value="accessoire">Accessoire</option>
              <option value="robe">Robe</option>
            </select>
            <input id="sizes" placeholder="Tailles (S,M,L)" />
            <input id="colors" placeholder="Couleurs" />
            <select id="stockStatus">
              <option value="">Statut stock</option>
              <option value="normal">Normal</option>
              <option value="low">Stock faible</option>
              <option value="out">Épuisé</option>
              <option value="coming">Bientôt disponible</option>
            </select>
            <input
              id="newDays"
              type="number"
              value="7"
              placeholder="Jours badge Nouveau"
            />
          </div>
          loading
          <input
            type="file"
            id="imageInput"
            multiple=""
            style="background: chartreuse"
          />
          <button id="uploadBtn">
            <span class="btn-text">Generer l'image</span>
          </button>
          <div class="preview" id="preview"></div>
          <button
            id="saveProduct"
            fdprocessedid="ziukap"
            style="background: red"
          >
            <span class="btn-text" style="">Enregistrer Produit</span>
          </button>
        </div>

        <!-- OTHER SECTIONS (hidden initially) -->

        <div class="section hidden" id="availability">
          <h3>Modifier disponibilité</h3>
          <input id="modifyProductId" placeholder="ID" />
          <select id="modifyAvailability">
            <option value="">Choisir</option>
            <option value="true">Disponible</option>
            <option value="false">Indisponible</option>
          </select>
          <button id="modifyBtn"><span class="btn-text">Modifier</span></button>
        </div>

        <div class="section hidden" id="price">
          <h3>Modifier prix</h3>
          <input id="modifyProductPriceId" placeholder="ID" />
          <input
            id="modifyProductPrice"
            type="number"
            placeholder="Nouveau prix"
          />
          <button id="modifyPriceBtn">
            <span class="btn-text">Modifier</span>
          </button>
        </div>

        <div class="section hidden" id="name">
          <h3>Modifier nom</h3>
          <input id="modifyProductNameId" placeholder="ID" />
          <input id="modifyProductName" placeholder="Nouveau nom" />
          <button id="modifyNameBtn">
            <span class="btn-text">Modifier</span>
          </button>
        </div>

        <div class="section hidden" id="badges">
          <h3>Modifier badges</h3>
          <input id="badgeProductId" placeholder="ID produit" />
          <select id="modifyStockStatus">
            <option value="">Statut stock</option>
            <option value="normal">Normal</option>
            <option value="low">Stock faible</option>
            <option value="out">Épuisé</option>
            <option value="coming">Bientôt disponible</option>
          </select>
          <input id="modifyNewDays" type="number" placeholder="Jours Nouveau" />
          <button id="modifyBadgesBtn">
            <span class="btn-text">Modifier badges</span>
          </button>
        </div>

        <div class="section hidden" id="delete">
          <h3>Supprimer produit</h3>
          <input id="deleteProductId" placeholder="ID" />
          <button id="deleteBtn">
            <span class="btn-text">Supprimer</span>
          </button>
        </div>

        <div class="section hidden" id="stats">
          <h3>Statistiques</h3>
          Produits existants :
          <span
            id="npe"
            style="
              background: red;
              padding: 5px;
              border-radius: 8px;
              font-weight: bold;
              color: aliceblue;
              box-shadow: 0 0 10px -2px yellowgreen;
            "
            >...</span
          >
          <br /><br />
          <button id="downloadProducts">
            <span class="btn-text">Télécharger products.json</span>
          </button>
        </div>
      </div>
    </div>

    <script>
      function securityCheck() {
        const securitySection = document.querySelector(".securitySection");
        const password = "ecrin123";
        const userName = "admin";

        const userNameV = document.querySelector("#userName").value;
        const passwordV = document.querySelector("#password").value;
        const submitbttn = document.querySelector(".connect");

        if (password === passwordV && userName === userNameV) {
          securitySection.style.backgroundColor = " green";
          securitySection.style.display = "none";
        } else {
          alert("nom d'utilisateur ou mot de passe incorrect!!");
        }
        console.log(userNameV + passwordV);
      }
      const sidebar = document.getElementById("sidebar");
      const sidebarOverlay = document.getElementById("sidebarOverlay");
      const hamburger = document.getElementById("hamburger");

      hamburger.onclick = () => {
        sidebar.classList.toggle("active");
        sidebarOverlay.classList.toggle("active");
      };

      sidebarOverlay.onclick = () => {
        sidebar.classList.remove("active");
        sidebarOverlay.classList.remove("active");
      };

      const menuButtons = document.querySelectorAll(".menu-btn");
      const sections = document.querySelectorAll(".section");

      menuButtons.forEach((btn) => {
        btn.addEventListener("click", function () {
          menuButtons.forEach((b) => b.classList.remove("active"));
          this.classList.add("active");

          sections.forEach((s) => s.classList.add("hidden"));
          document
            .getElementById(this.dataset.target)
            .classList.remove("hidden");

          sidebar.classList.remove("active");
          sidebarOverlay.classList.remove("active");
        });
      });
      function toggleOverlay(show) {}

      function showToast(message, isError = false) {
        const toast = document.getElementById("toast");
        toast.textContent = message;
        toast.className = "toast show";
        if (isError) toast.classList.add("error");
        setTimeout(() => toast.classList.remove("show"), 3000);
      }

      const ADMIN_KEY = "1234";

      function setLoading(button, loading, text) {
        const span = button.querySelector(".btn-text");
        if (loading) {
          button.classList.add("loading");
          span.innerHTML =
            '<span class="spinner"></span><span style="margin-left:8px;">' +
            text +
            "</span>";
        } else {
          button.classList.remove("loading");
          span.textContent = text;
        }
      }

      async function safeFetch(url, options) {
        const res = await fetch(url, options);
        const text = await res.text();
        try {
          return JSON.parse(text);
        } catch {
          throw new Error("Réponse serveur invalide");
        }
      }

      document.getElementById("uploadBtn").onclick = async function () {
        setLoading(this, true, "Veuillez patienter...");
        const files = document.getElementById("imageInput").files;
        const preview = document.getElementById("preview");
        for (const file of files) {
          const formData = new FormData();
          formData.append("image", file);
          const data = await safeFetch("/admin/upload-image", {
            method: "POST",
            headers: { "x-admin-key": ADMIN_KEY },
            body: formData,
          });
          if (data.imageUrl) {
            const wrapper = document.createElement("div");
            wrapper.className = "preview-item";

            const img = document.createElement("img");
            img.src = data.imageUrl;

            const removeBtn = document.createElement("button");
            removeBtn.className = "remove-img";
            removeBtn.innerHTML = "×";

            removeBtn.onclick = function () {
              wrapper.remove();
            };

            wrapper.appendChild(img);
            wrapper.appendChild(removeBtn);
            preview.appendChild(wrapper);
          }
        }
        setLoading(this, false, "Generer images");
      };

      document.getElementById("saveProduct").onclick = async function () {
        setLoading(this, true, "Enregistrement...");
        toggleOverlay(true);

        try {
          const stockStatus = document.getElementById("stockStatus").value;
          const newDays = Number(document.getElementById("newDays").value);

          let newUntil = null;
          if (newDays && newDays > 0) {
            const date = new Date();
            date.setDate(date.getDate() + newDays);
            newUntil = date.toISOString();
          }

          const product = {
            id: document.getElementById("id").value.trim(),
            name: document.getElementById("name").value.trim(),
            price: Number(document.getElementById("price").value),
            category: document.getElementById("category").value,
            type: document.getElementById("type").value,

            images: Array.from(
              document.getElementById("preview").querySelectorAll("img"),
            ).map((img) => img.src),

            image:
              Array.from(
                document.getElementById("preview").querySelectorAll("img"),
              )[0]?.src || null,

            options: {
              size: document
                .getElementById("sizes")
                .value.split(",")
                .map((s) => s.trim())
                .filter(Boolean),

              color: document
                .getElementById("colors")
                .value.split(",")
                .map((c) => c.trim())
                .filter(Boolean),
            },

            newUntil: newUntil,

            isRunningLow: stockStatus === "low",
            epuised: stockStatus === "out",
            comingSoon: stockStatus === "coming",
          };

          if (!product.id || !product.name || !product.price) {
            showToast("Champs obligatoires manquants", true);
            return;
          }

          const data = await safeFetch("/admin/add-product", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "x-admin-key": ADMIN_KEY,
            },
            body: JSON.stringify(product),
          });

          if (data.success) {
            showToast("Produit ajouté avec succès");
            document.querySelectorAll("input").forEach((i) => (i.value = ""));
            document.getElementById("preview").innerHTML = "";
          } else {
            showToast("Erreur serveur", true);
          }
        } catch (e) {
          showToast(e.message, true);
        }

        toggleOverlay(false);
        setLoading(this, false, "Enregistrer");
      };

      document.getElementById("modifyBtn").onclick = async function () {
        setLoading(this, true, "Modification...");
        try {
          const id = document.getElementById("modifyProductId").value;
          const data = await safeFetch(`/admin/modify-product/${id}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "x-admin-key": ADMIN_KEY,
            },
            body: JSON.stringify({
              available: modifyAvailability.value === "true",
            }),
          });
          data.success
            ? showToast("Disponibilité modifiée")
            : showToast("Erreur", true);
        } catch (e) {
          showToast(e.message, true);
        }
        setLoading(this, false, "Modifier");
      };

      document.getElementById("modifyPriceBtn").onclick = async function () {
        setLoading(this, true, "Modification...");
        try {
          const data = await safeFetch(
            `/admin/modify-product/${modifyProductPriceId.value}/price`,
            {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                "x-admin-key": ADMIN_KEY,
              },
              body: JSON.stringify({
                price: Number(modifyProductPrice.value),
              }),
            },
          );
          data.success ? showToast("Prix modifié") : showToast("Erreur", true);
        } catch (e) {
          showToast(e.message, true);
        }
        setLoading(this, false, "Modifier");
      };

      document.getElementById("modifyNameBtn").onclick = async function () {
        setLoading(this, true, "Modification...");
        try {
          const data = await safeFetch(
            `/admin/modify-product/${modifyProductNameId.value}/name`,
            {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                "x-admin-key": ADMIN_KEY,
              },
              body: JSON.stringify({
                name: modifyProductName.value,
              }),
            },
          );
          data.success ? showToast("Nom modifié") : showToast("Erreur", true);
        } catch (e) {
          showToast(e.message, true);
        }
        setLoading(this, false, "Modifier");
      };

      document.getElementById("modifyBadgesBtn").onclick = async function () {
        setLoading(this, true, "Modification...");
        try {
          const productId = document
            .getElementById("badgeProductId")
            .value.trim();
          const stockStatus =
            document.getElementById("modifyStockStatus").value;
          const newDays = Number(
            document.getElementById("modifyNewDays").value,
          );

          let newUntil = null;

          if (newDays > 0) {
            const date = new Date();
            date.setDate(date.getDate() + newDays);
            newUntil = date.toISOString();
          }

          const data = await safeFetch(
            `/admin/modify-product/${productId}/badges`,
            {
              method: "PUT",
              headers: {
                "Content-Type": "application/json",
                "x-admin-key": ADMIN_KEY,
              },
              body: JSON.stringify({
                newUntil: newUntil,
                isRunningLow: stockStatus === "low",
                epuised: stockStatus === "out",
                comingSoon: stockStatus === "coming",
              }),
            },
          );

          data.success
            ? showToast("Badges modifiés")
            : showToast("Erreur", true);
        } catch (e) {
          showToast(e.message, true);
        }

        setLoading(this, false, "Modifier badges");
      };

      document.getElementById("deleteBtn").onclick = async function () {
        if (!confirm("Confirmer la suppression ?")) return;
        setLoading(this, true, "Suppression...");
        try {
          const data = await safeFetch(
            `/admin/delete-product/${deleteProductId.value}`,
            {
              method: "DELETE",
              headers: { "x-admin-key": ADMIN_KEY },
            },
          );
          data.success
            ? showToast("Produit supprimé")
            : showToast("Erreur", true);
        } catch (e) {
          showToast(e.message, true);
        }
        setLoading(this, false, "Supprimer");
      };

      document.getElementById("downloadProducts").onclick = async function () {
        setLoading(this, true, "Téléchargement...");
        toggleOverlay(true);
        const res = await fetch("/admin/download-products", {
          headers: { "x-admin-key": ADMIN_KEY },
        });
        const blob = await res.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "products.json";
        a.click();
        toggleOverlay(false);
        setLoading(this, false, "Télécharger products.json");
      };

      safeFetch("/api/products")
        .then((products) => {
          document.getElementById("npe").textContent =
            Object.keys(products).length;
        })
        .catch(() => {
          document.getElementById("npe").textContent = "Erreur";
        });
    </script>
