<!doctype html>
<html lang="fr">
      <head>
<meta charset="UTF-8" />
<title>Admin – Ecrin d'art d'amina</title>

        <meta
              name="viewport"
              content="width=device-width, initial-scale=1.0"
            />
            <link
              href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
              rel="stylesheet"
            />

            <style>
              * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
              }
              body {
                font-family: "Inter", sans-serif;
                background: linear-gradient(135deg, #f6f7fb, #e9ecf5);
                color: #2c2c2c;
              }
              .admin {
                max-width: 1100px;
                margin: 40px 4%;
                padding: 40px;
                background: #fff;
                border-radius: 20px;
                box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
              }
              h2 {
                margin-bottom: 25px;
                font-size: 28px;
              }
              .section {
                margin-bottom: 40px;
                padding: 25px;
                border-radius: 16px;
                background: #fafafa;
                border: 1px solid #eee;
              }
              .section h3 {
                margin-bottom: 15px;
              }

              .grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
              }
              input,
              select {
                padding: 12px;
                border-radius: 10px;
                border: 1px solid #ddd;
                background: #fff;
                margin: 10px;
              }
              input:focus,
              select:focus {
                outline: none;
                border-color: #000;
              }

              button {
                padding: 12px 20px;
                border: none;
                border-radius: 10px;
                background: #487d46;
                color: #fff;
                cursor: pointer;
                transition: 0.2s;
              }
              button:hover {
                opacity: 0.85;
              }
              button.loading {
                opacity: 0.6;
                pointer-events: none;
              }

              .preview {
                display: flex;
                gap: 10px;
                flex-wrap: wrap;
                margin-top: 10px;
              }
              .preview img {
                width: 90px;
                height: 90px;
                object-fit: cover;
                border-radius: 8px;
              }

              .status {
                margin-top: 10px;
                font-size: 14px;
                font-weight: 600;
              }
              .success {
                color: green;
              }
              .error {
                color: red;
              }

              .counter-box {
                padding: 10px;
                background: #ff0000;
                color: #ffffff;
                border-radius: 8px;
                display: inline-block;
                margin-top: 10px;
                box-shadow: 0 0 20px 0 rgba(0, 0, 0, 0.4);
              }
              @media (max-width: 768px) {
                .grid {
                  grid-template-columns: 1fr;
                }
              }
            </style>
          </head>
          <body>
            <div class="admin">
              <h2>Admin Dashboard</h2>

              <div class="section">
                <h3>Ajouter un produit</h3>

                <div class="grid">
                  <input id="id" placeholder="ID produit" />
                  <input id="name" placeholder="Nom du produit" />
                  <input id="price" type="number" placeholder="Prix" />

                  <select id="category">
                    <option value="">Choisir la page</option>
                    <option value="Homme">Homme</option>
                    <option value="Femme">Femme</option>
                    <option value="Enfant">Enfant</option>
                    <option value="Cadeau">Cadeau</option>
                    <option value="Maternite">Maternite</option>
                    <option value="CadeauSpecial">Cadeau Special</option>
                    <option value="Sport">Sport</option>
                  </select>

                  <select id="type">
                    <option value="">Type de produit</option>
                    <option value="haut">Haut</option>
                    <option value="bas">Bas</option>
                    <option value="chaussure">Chaussure</option>
                    <option value="accessoire">Accessoire</option>
                    <option value="lingerie">Lingerie</option>
                    <option value="robe">Robe</option>
                    <option value="habitmuslim">Habit Muslim</option>
                    <option value="complet">Complet</option>
                    <option value="maquillage">maquillage</option>
                    <option value="fragrance">fragrance</option>
                    <option value="haircare">haircare</option>
                    <option value="Lunettes">Lunettes</option>
                    <option value="Sac">Sac</option>
                    <option value="bracha">bracha</option>
                    <option value="Phone">Phone</option>
                    <option value="Pijama">Pijama</option>
                    <option value="Mailles">Mailles</option>
                    <option value="Tenuesdeceremonie">
                      Tenues de Cérémonie
                    </option>
                    <option value="Allaitement">Allaitement</option>
                    <option value="Ensembledenuit">Ensemble de Nuit</option>
                    <option value="Shooting">Shooting</option>
                    <option value="Gourde">Gourde</option>
                  </select>

                  <input id="sizes" placeholder="Tailles (S,M,L)" />
                  <input id="colors" placeholder="Couleurs" />
                  <input id="villes" placeholder="Villes" />

                  <input
                    id="newDays"
                    type="number"
                    placeholder="Durée NEW (jours)"
                    value="7"
                  />
                </div>

                <br />
                <input type="file" id="imageInput" multiple />
                <button id="uploadBtn">Uploader images</button>
                <div class="preview" id="preview"></div>

                <br />
                <button id="saveProduct">Enregistrer</button>
                <div id="saveStatus" class="status"></div>
              </div>

              <div class="section">
                <h3>Modifier disponibilité</h3>
                <input id="modifyProductId" placeholder="ID" />
                <select id="modifyAvailability">
                  <option value="">Choisir</option>
                  <option value="true">Disponible</option>
                  <option value="false">Indisponible</option>
                </select>
                <button id="modifyBtn">Modifier</button>
                <div id="modifyStatus" class="status"></div>
              </div>

              <div class="section">
                <h3>Modifier prix</h3>
                <input id="modifyProductPriceId" placeholder="ID" />
                <input
                  id="modifyProductPrice"
                  type="number"
                  placeholder="Nouveau prix"
                />
                <button id="modifyPriceBtn">Modifier</button>
                <div id="priceStatus" class="status"></div>
              </div>

              <div class="section">
                <h3>Modifier nom</h3>
                <input id="modifyProductNameId" placeholder="ID" />
                <input id="modifyProductName" placeholder="Nouveau nom" />
                <button id="modifyNameBtn">Modifier</button>
                <div id="nameStatus" class="status"></div>
              </div>

              <div class="section">
                <h3>Supprimer produit</h3>
                <input id="deleteProductId" placeholder="ID" />
                <button id="deleteBtn">Supprimer</button>
                <div id="deleteStatus" class="status"></div>
              </div>

              <div class="counter-box">
                Produits existants : <span id="npe" style="font-weight: bold; font-weight: bold;
    color: #000000;
    padding: 5px;
    background: white;
    border-radius: 10px;
    font: caption;">...</span>
              </div>
              <div class="telecharger-products.json">
                <button id="downloadProducts">Télécharger products.json</button> </div>
              </div>
            </div>

            <script>
              const ADMIN_KEY = "1234";
              const uploadedImages = [];
              const preview = document.getElementById("preview");

              function showStatus(id, message, type = "success") {
                const el = document.getElementById(id);
                el.textContent = message;
                el.className = "status " + type;
              }

              async function safeFetch(url, options) {
                const res = await fetch(url, options);
                const text = await res.text();
                try {
                  return JSON.parse(text);
                } catch {
                  console.error("Server returned:", text);
                  throw new Error("Réponse serveur invalide");
                }
              } 


              document.getElementById("uploadBtn").onclick = async () => {
                const files = document.getElementById("imageInput").files;
                for (let file of files) {
                  const formData = new FormData();
                  formData.append("image", file);
                  const data = await safeFetch("/admin/upload-image", {
                    method: "POST",
                    headers: { "x-admin-key": ADMIN_KEY },
                    body: formData,
                  });
                  if (data.imageUrl) {
                    uploadedImages.push(data.imageUrl);
                    const img = document.createElement("img");
                    img.src = data.imageUrl;
                    preview.appendChild(img);
                  }
                }
              };

              function trim(str) {
                    return str.trim();
                  }
                  
              document.getElementById("saveProduct").onclick =
                async function () {
                  this.classList.add("loading");

                  const newDays =
                    Number(document.getElementById("newDays").value) || 0;


                  const product = {
                    id: id.value.trim(),
                    name: name.value.trim(),
                    category: category.value,
                    type: type.value,
                    price: Number(price.value),
                    images: uploadedImages,
                    image: uploadedImages[0],
                    newUntil:
                      newDays > 0
                        ? new Date(
                            Date.now() + newDays * 86400000,
                          ).toISOString()
                        : null,
                    options: {
                      size: sizes.value
                        .split(",")
                        .map((s) => s.trim())
                        .filter(Boolean),
                      color: colors.value
                        .split(",")
                        .map((c) => c.trim())
                        .filter(Boolean),
                    },
                    lieuDeLIvraison: {
                      ville: villes.value
                        .split(",")
                        .map((v) => v.trim())
                        .filter(Boolean),
                    },
                  };

                  try {
                    const data = await safeFetch("/admin/add-product", {
                      method: "POST",
                      headers: {
                        "Content-Type": "application/json",
                        "x-admin-key": ADMIN_KEY,
                      },
                      body: JSON.stringify(product),
                    });

                    if (data.success) {
                      showStatus("saveStatus", "Produit ajouté ✔");
                    } else {
                      showStatus("saveStatus", "Erreur serveur", "error");
                    }
                  } catch (e) {
                    showStatus("saveStatus", e.message, "error");
                  }

                  this.classList.remove("loading");
                };

              document.getElementById("modifyBtn").onclick = async () => {
                try {
                  const data = await safeFetch(
                    `/admin/modify-product/${modifyProductId.value}`,
                    {
                      method: "PUT",
                      headers: {
                        "Content-Type": "application/json",
                        "x-admin-key": ADMIN_KEY,
                      },
                      body: JSON.stringify({
                        available: modifyAvailability.value === "true",
                      }),
                    },
                  );
                  showStatus(
                    "modifyStatus",
                    data.success ? "Modifié ✔" : "Erreur",
                    "error",
                  );
                } catch (e) {
                  showStatus("modifyStatus", e.message, "error");
                }
              };

              document.getElementById("modifyPriceBtn").onclick = async () => {
                try {
                  const data = await safeFetch(
                    `/admin/modify-product/${modifyProductPriceId.value}/price`,
                    {
                      method: "PUT",
                      headers: {
                        "Content-Type": "application/json",
                        "x-admin-key": ADMIN_KEY,
                      },
                      body: JSON.stringify({
                        price: Number(modifyProductPrice.value),
                      }),
                    },
                  );
                  showStatus(
                    "priceStatus",
                    data.success ? "Prix modifié ✔" : "Erreur",
                    "error",
                  );
                } catch (e) {
                  showStatus("priceStatus", e.message, "error");
                }
              };

              document.getElementById("modifyNameBtn").onclick = async () => {
                try {
                  const data = await safeFetch(
                    `/admin/modify-product/${modifyProductNameId.value}/name`,
                    {
                      method: "PUT",
                      headers: {
                        "Content-Type": "application/json",
                        "x-admin-key": ADMIN_KEY,
                      },
                      body: JSON.stringify({ name: modifyProductName.value }),
                    },
                  );
                  showStatus(
                    "nameStatus",
                    data.success ? "Nom modifié ✔" : "Erreur",
                    "error",
                  );
                } catch (e) {
                  showStatus("nameStatus", e.message, "error");
                }
              };

              document.getElementById("deleteBtn").onclick = async () => {
                try {
                  const data = await safeFetch(
                    `/admin/delete-product/${deleteProductId.value}`,
                    {
                      method: "DELETE",
                      headers: { "x-admin-key": ADMIN_KEY },
                    },
                  );
                  showStatus(
                    "deleteStatus",
                    data.success ? "Supprimé ✔" : "Erreur",
                    "error",
                  );
                } catch (e) {
                  showStatus("deleteStatus", e.message, "error");
                }
              };
              
              safeFetch("/api/products")
                .then((products) => {
                  document.getElementById("npe").textContent =
                    Object.keys(products).length;
                })
                .catch(() => {
                  document.getElementById("npe").textContent = "Erreur";
                });
              
                document.getElementById("downloadProducts").onclick = async () => { const res = await
                   fetch("/admin/download-products", { headers: 
                    { "x-admin-key": "1234" },
                  });
                    if (!res.ok)
                     return alert("Erreur 😢");
                      const blob = await res.blob();
                 const url = window.URL.createObjectURL(blob);
                  const a = document.createElement("a"); a.href = url;
                  a.download = "products.json"; a.click(); };
            </script>
          </body>
        </html>
      </div>
    </div>
  </body>
</html>
